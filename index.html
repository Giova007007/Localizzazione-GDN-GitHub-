<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📍 La Mia Posizione</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GDN Posizione" />
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" href="icon-192.png" type="image/png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #263348;
      --surface3: #1a2438;
      --accent: #38bdf8;
      --accent2: #0ea5e9;
      --green: #4ade80;
      --red: #f87171;
      --yellow: #fbbf24;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --border: #334155;
      --radius: 18px;
    }

    html {
      height: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
      overflow-y: auto;
    }

    /* Central scrollable column */
    #page {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 96px 16px 60px;
      width: 100%;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    header p {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%;
      max-width: 720px;
      padding: 28px 24px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }

    /* ── STATE: LOADING ── */
    #state-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 12px 0;
    }

    .spinner {
      width: 52px;
      height: 52px;
      border: 5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #state-loading p {
      color: var(--muted);
      font-size: 1rem;
    }

    /* ── STATE: ERROR ── */
    #state-error {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-align: center;
      padding: 8px 0;
    }

    .error-icon { font-size: 3rem; line-height: 1; }

    #error-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--red);
    }

    #error-msg {
      font-size: 0.95rem;
      color: var(--muted);
      max-width: 400px;
      line-height: 1.6;
    }

    /* ── STATE: SUCCESS ── */
    #state-success {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .address-block { text-align: center; }

    .address-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin-bottom: 8px;
    }

    #address-text {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      line-height: 1.15;
      color: var(--text);
      word-break: break-word;
    }

    .coords-row {
      display: flex;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    .coord-pill {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 18px;
      font-size: 0.85rem;
      color: var(--muted);
      font-family: 'Courier New', monospace;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .coord-pill span.label {
      color: var(--accent);
      font-weight: 700;
    }

    .accuracy-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(1.4); }
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
    }

    /* ── MAP WRAP ── */
    #map-wrap {
      width: 100%;
      max-width: 720px;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
      display: none;
      position: relative;
    }

    /* Fullscreen mode */
    #map-wrap.fullscreen {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      max-width: 100vw !important;
      height: 100dvh !important;
      border-radius: 0 !important;
      border: none !important;
      z-index: 9000 !important;
    }

    #map-wrap.fullscreen #map {
      height: 100dvh !important;
      min-height: unset !important;
    }

    #map {
      height: 65vh;
      min-height: 380px;
      width: 100%;
      background: var(--surface);
      transition: height 0.3s;
    }

    /* ── FULLSCREEN TOGGLE BUTTON (on map) ── */
    #btn-fullscreen {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 9100;
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.85);
      color: var(--accent);
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
      border: 1px solid var(--border);
      transition: background 0.15s, transform 0.15s;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }

    #btn-fullscreen:hover {
      background: rgba(56,189,248,0.2);
      transform: scale(1.08);
    }

    /* ── REFRESH BUTTON (fixed top-left, circular) ── */
    #btn-refresh {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 1000;
      width: 60px;
      height: 60px;
      min-height: unset;
      padding: 0;
      font-size: 1.6rem;
      line-height: 1;
      font-weight: 700;
      border: none;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent2), #7c3aed);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      box-shadow: 0 4px 20px rgba(56,189,248,0.45);
    }

    #btn-refresh:hover:not(:disabled) {
      transform: scale(1.1);
      box-shadow: 0 8px 30px rgba(56,189,248,0.6);
    }

    #btn-refresh:active:not(:disabled) { transform: scale(0.96); }

    #btn-refresh:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    #btn-refresh.spinning {
      animation: btnSpin 1s linear infinite;
    }

    @keyframes btnSpin { to { transform: rotate(360deg); } }

    /* ── TIMESTAMP ── */
    #last-update {
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
      width: 100%;
      max-width: 720px;
    }

    /* ── HISTORY SECTION ── */
    #history-wrap {
      width: 100%;
      max-width: 720px;
      display: none;
      flex-direction: column;
      gap: 14px;
      /* Visually separated from map above */
      border-top: 2px solid var(--border);
      padding-top: 28px;
      margin-top: 8px;
    }

    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .history-title {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #btn-clear-all {
      background: transparent;
      border: 1px solid var(--red);
      color: var(--red);
      border-radius: 8px;
      padding: 5px 12px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }

    #btn-clear-all:hover {
      background: var(--red);
      color: #fff;
    }

    #history-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .history-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      transition: border-color 0.15s, transform 0.15s;
      animation: fadeSlide 0.3s ease both;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .history-item:hover {
      border-color: var(--accent2);
    }

    .history-item-icon {
      font-size: 1.4rem;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .history-item-body {
      flex: 1;
      min-width: 0;
    }

    .history-item-address {
      font-size: 0.97rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
      word-break: break-word;
    }

    .history-item-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
      align-items: center;
    }

    .history-item-time {
      font-size: 0.72rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .history-item-coords {
      font-size: 0.7rem;
      color: var(--muted);
      font-family: 'Courier New', monospace;
      background: var(--surface2);
      border-radius: 6px;
      padding: 2px 7px;
    }

    .history-item-acc {
      font-size: 0.7rem;
      color: var(--green);
      background: rgba(74,222,128,0.1);
      border: 1px solid rgba(74,222,128,0.25);
      border-radius: 6px;
      padding: 2px 7px;
    }

    /* Locate-on-map mini button */
    .btn-locate {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--accent);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 0.72rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    .btn-locate:hover {
      background: rgba(56,189,248,0.12);
      border-color: var(--accent);
    }

    .btn-delete {
      flex-shrink: 0;
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 1.1rem;
      cursor: pointer;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      align-self: center;
    }

    .btn-delete:hover {
      background: rgba(248,113,113,0.15);
      color: var(--red);
    }

    .history-empty {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 24px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .history-empty span:first-child { font-size: 2rem; }

    /* ── HIDDEN UTILITY ── */
    .hidden { display: none !important; }

    /* ── LEAFLET DARK TILES OVERRIDE ── */
    .leaflet-tile-pane { filter: brightness(0.88) saturate(0.9); }

    /* ── RESPONSIVE TWEAKS ── */
    @media (max-width: 480px) {
      #page { padding: 88px 10px 48px; gap: 16px; }
      .card { padding: 20px 16px; }
      #address-text { font-size: clamp(1.8rem, 7vw, 2.4rem); }
      .history-item { padding: 12px 12px; gap: 10px; }
    }
  </style>
</head>
<body>

  <!-- REFRESH BUTTON (fixed top-left, circular) -->
  <button id="btn-refresh" onclick="getLocation()" title="Aggiorna posizione">
    📍
  </button>

  <!-- SCROLLABLE PAGE COLUMN -->
  <div id="page">

  <!-- HEADER -->
  <header>
    <h1>📍 La Mia Posizione</h1>
    <p>Rilevamento GPS in tempo reale</p>
  </header>

  <!-- INFO CARD -->
  <div class="card" id="info-card">

    <!-- LOADING STATE -->
    <div id="state-loading">
      <div class="spinner"></div>
      <p>Rilevamento posizione in corso…</p>
    </div>

    <!-- ERROR STATE -->
    <div id="state-error" class="hidden">
      <div class="error-icon">⚠️</div>
      <div id="error-title">Impossibile rilevare la posizione</div>
      <div id="error-msg"></div>
    </div>

    <!-- SUCCESS STATE -->
    <div id="state-success" class="hidden">

      <!-- Address -->
      <div class="address-block">
        <div class="address-label">📌 Indirizzo rilevato</div>
        <div id="address-text">—</div>
      </div>

      <hr class="divider" />

      <!-- Coordinates pills -->
      <div class="coords-row">
        <div class="coord-pill">
          <span class="label">LAT</span>
          <span id="coord-lat">—</span>
        </div>
        <div class="coord-pill">
          <span class="label">LON</span>
          <span id="coord-lon">—</span>
        </div>
      </div>

      <!-- Accuracy -->
      <div class="accuracy-badge">
        <div class="dot"></div>
        <span>Accuratezza: <strong id="coord-acc">—</strong></span>
      </div>

    </div>
  </div>

  <!-- MAP -->
  <div id="map-wrap">
    <div id="map"></div>
    <!-- Fullscreen button overlaid on map -->
    <button id="btn-fullscreen" onclick="toggleFullscreen()" title="Schermo intero">
      ⛶
    </button>
  </div>

  <!-- LAST UPDATE -->
  <div id="last-update" class="hidden">
    Ultimo aggiornamento: <span id="update-time">—</span>
  </div>

  <!-- HISTORY SECTION -->
  <div id="history-wrap">
    <div class="history-header">
      <div class="history-title">🕓 Cronologia posizioni</div>
      <button id="btn-clear-all" onclick="clearAllHistory()">🗑 Cancella tutto</button>
    </div>
    <div id="history-list"></div>
  </div>

  </div><!-- /#page -->

  <script>
    /* ═══════════════════════════════════════
       STATE MANAGEMENT
    ═══════════════════════════════════════ */
    const states = { LOADING: 'loading', ERROR: 'error', SUCCESS: 'success' };

    let map            = null;
    let marker         = null;
    let isFullscreen   = false;
    let currentState   = null;

    function showState(state) {
      currentState = state;
      document.getElementById('state-loading').classList.toggle('hidden', state !== states.LOADING);
      document.getElementById('state-error').classList.toggle('hidden',   state !== states.ERROR);
      document.getElementById('state-success').classList.toggle('hidden', state !== states.SUCCESS);

      const mapWrap = document.getElementById('map-wrap');
      mapWrap.style.display = state === states.SUCCESS ? 'block' : 'none';

      const btn = document.getElementById('btn-refresh');
      btn.disabled = state === states.LOADING;
      btn.classList.toggle('spinning', state === states.LOADING);
    }

    /* ═══════════════════════════════════════
       GEOLOCATION
    ═══════════════════════════════════════ */
    function getLocation() {
      showState(states.LOADING);
      document.getElementById('last-update').classList.add('hidden');

      if (!navigator.geolocation) {
        showError('Geolocalizzazione non supportata',
          'Il tuo browser non supporta la geolocalizzazione. Prova con un browser moderno come Chrome, Firefox o Safari.');
        return;
      }

      navigator.geolocation.getCurrentPosition(onSuccess, onError, {
        enableHighAccuracy: true,
        timeout: 12000,
        maximumAge: 0
      });
    }

    /* ═══════════════════════════════════════
       SUCCESS HANDLER
    ═══════════════════════════════════════ */
    async function onSuccess(pos) {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;
      const acc = Math.round(pos.coords.accuracy);

      document.getElementById('coord-lat').textContent = lat.toFixed(6);
      document.getElementById('coord-lon').textContent = lon.toFixed(6);
      document.getElementById('coord-acc').textContent = `±${acc} m`;

      showState(states.SUCCESS);
      initOrUpdateMap(lat, lon);

      document.getElementById('address-text').textContent = '…';

      let addr = '';
      try {
        addr = await reverseGeocode(lat, lon);
        document.getElementById('address-text').textContent = addr || `${lat.toFixed(5)}, ${lon.toFixed(5)}`;
      } catch (_) {
        addr = `${lat.toFixed(5)}, ${lon.toFixed(5)}`;
        document.getElementById('address-text').textContent = addr;
      }

      /* Timestamp */
      const now = new Date();
      const timeStr = now.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      const dateStr = now.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
      document.getElementById('update-time').textContent = `${dateStr} ${timeStr}`;
      document.getElementById('last-update').classList.remove('hidden');

      /* Save to history */
      addToHistory({ lat, lon, acc, addr, timestamp: now.toISOString() });
    }

    /* ═══════════════════════════════════════
       ERROR HANDLER
    ═══════════════════════════════════════ */
    function onError(err) {
      let title = 'Errore di geolocalizzazione';
      let msg   = 'Si è verificato un errore sconosciuto.';
      switch (err.code) {
        case err.PERMISSION_DENIED:
          title = '🔒 Accesso negato';
          msg   = 'Hai negato l\'accesso alla posizione. Per continuare, abilita il permesso di geolocalizzazione nelle impostazioni del browser e riprova.';
          break;
        case err.POSITION_UNAVAILABLE:
          title = '📡 Posizione non disponibile';
          msg   = 'Il dispositivo non riesce a determinare la posizione. Verifica che GPS e/o Wi-Fi siano attivi e riprova.';
          break;
        case err.TIMEOUT:
          title = '⏱ Timeout scaduto';
          msg   = 'Il rilevamento ha impiegato troppo tempo. Assicurati di avere una buona ricezione GPS o di rete, poi riprova.';
          break;
      }
      showError(title, msg);
    }

    function showError(title, msg) {
      document.getElementById('error-title').textContent = title;
      document.getElementById('error-msg').textContent   = msg;
      showState(states.ERROR);
    }

    /* ═══════════════════════════════════════
       REVERSE GEOCODING (Nominatim)
    ═══════════════════════════════════════ */
    async function reverseGeocode(lat, lon) {
      const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&addressdetails=1`;
      const res = await fetch(url, { headers: { 'Accept-Language': 'it,en' } });
      if (!res.ok) throw new Error('Nominatim error');
      const data = await res.json();
      const a = data.address || {};
      const parts = [];
      const road  = a.road || a.pedestrian || a.footway || a.path || a.cycleway || a.street || '';
      const house = a.house_number || '';
      if (road && house) parts.push(`${road} ${house}`);
      else if (road)     parts.push(road);
      const city = a.city || a.town || a.village || a.hamlet || a.municipality || '';
      if (city)      parts.push(city);
      if (a.postcode) parts.push(a.postcode);
      if (a.country)  parts.push(a.country);
      return parts.join(', ');
    }

    /* ═══════════════════════════════════════
       LEAFLET MAP
    ═══════════════════════════════════════ */
    function initOrUpdateMap(lat, lon) {
      if (!map) {
        map = L.map('map', { zoomControl: true }).setView([lat, lon], 16);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
          maxZoom: 19
        }).addTo(map);

        const icon = L.divIcon({
          className: '',
          html: `<div style="
            width:38px; height:38px;
            background: #38bdf8;
            border: 3px solid #fff;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            box-shadow: 0 4px 14px rgba(0,0,0,0.5);
          "></div>`,
          iconSize: [38, 38],
          iconAnchor: [19, 38],
          popupAnchor: [0, -40]
        });

        marker = L.marker([lat, lon], { icon }).addTo(map);
        marker.bindPopup('<b>📍 Sei qui</b>').openPopup();
      } else {
        map.setView([lat, lon], 16);
        marker.setLatLng([lat, lon]);
        marker.openPopup();
      }
      setTimeout(() => map.invalidateSize(), 100);
    }

    /* ═══════════════════════════════════════
       FULLSCREEN MAP TOGGLE
    ═══════════════════════════════════════ */
    function toggleFullscreen() {
      const wrap = document.getElementById('map-wrap');
      const btn  = document.getElementById('btn-fullscreen');
      isFullscreen = !isFullscreen;
      wrap.classList.toggle('fullscreen', isFullscreen);
      btn.textContent = isFullscreen ? '✕' : '⛶';
      btn.title       = isFullscreen ? 'Esci dallo schermo intero' : 'Schermo intero';
      document.body.style.overflow = isFullscreen ? 'hidden' : '';
      setTimeout(() => map && map.invalidateSize(), 150);
    }

    /* Close fullscreen on Escape key */
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && isFullscreen) toggleFullscreen();
    });

    /* ═══════════════════════════════════════
       HISTORY — STORAGE & RENDER
    ═══════════════════════════════════════ */
    const HISTORY_KEY = 'gps_history';
    const MAX_HISTORY = 30;

    function loadHistory() {
      try {
        return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
      } catch { return []; }
    }

    function saveHistory(arr) {
      localStorage.setItem(HISTORY_KEY, JSON.stringify(arr));
    }

    function addToHistory(entry) {
      const hist = loadHistory();
      /* Avoid exact duplicates (same lat/lon within 1 second) */
      const last = hist[0];
      if (last &&
          Math.abs(last.lat - entry.lat) < 0.00001 &&
          Math.abs(last.lon - entry.lon) < 0.00001) {
        /* Update timestamp only */
        hist[0].timestamp = entry.timestamp;
        hist[0].acc       = entry.acc;
      } else {
        hist.unshift(entry);
        if (hist.length > MAX_HISTORY) hist.splice(MAX_HISTORY);
      }
      saveHistory(hist);
      renderHistory();
    }

    function deleteHistoryItem(index) {
      const hist = loadHistory();
      hist.splice(index, 1);
      saveHistory(hist);
      renderHistory();
    }

    function clearAllHistory() {
      if (!confirm('Vuoi eliminare tutta la cronologia?')) return;
      saveHistory([]);
      renderHistory();
    }

    function locateHistoryItem(lat, lon) {
      /* Exit fullscreen if open */
      if (isFullscreen) toggleFullscreen();
      /* Scroll to map */
      document.getElementById('map-wrap').scrollIntoView({ behavior: 'smooth', block: 'center' });
      if (map) {
        map.setView([lat, lon], 16);
        if (marker) { marker.setLatLng([lat, lon]); marker.openPopup(); }
      }
    }

    function formatDate(isoStr) {
      const d = new Date(isoStr);
      return d.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' })
        + ' ' + d.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function renderHistory() {
      const hist = loadHistory();
      const wrap = document.getElementById('history-wrap');
      const list = document.getElementById('history-list');

      /* Show/hide the entire section */
      wrap.style.display = hist.length > 0 ? 'flex' : 'none';

      if (hist.length === 0) {
        list.innerHTML = `
          <div class="history-empty">
            <span>🗺️</span>
            <span>Nessuna posizione salvata</span>
          </div>`;
        return;
      }

      list.innerHTML = hist.map((item, i) => `
        <div class="history-item" id="hist-item-${i}">
          <div class="history-item-icon">📍</div>
          <div class="history-item-body">
            <div class="history-item-address">${escapeHtml(item.addr || `${item.lat.toFixed(5)}, ${item.lon.toFixed(5)}`)}</div>
            <div class="history-item-meta">
              <div class="history-item-time">🕓 ${formatDate(item.timestamp)}</div>
              <div class="history-item-coords">${item.lat.toFixed(5)}, ${item.lon.toFixed(5)}</div>
              <div class="history-item-acc">±${item.acc} m</div>
              <button class="btn-locate" onclick="locateHistoryItem(${item.lat}, ${item.lon})">🗺 Vai alla mappa</button>
            </div>
          </div>
          <button class="btn-delete" onclick="deleteHistoryItem(${i})" title="Elimina">✕</button>
        </div>
      `).join('');
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    /* ═══════════════════════════════════════
       INIT
    ═══════════════════════════════════════ */
    renderHistory();   /* Show existing history on load */
    getLocation();

    /* PWA: registrazione Service Worker */
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(console.error);
      });
    }

    /* DEBUG TEMPORANEO: indicatore installabilità PWA */
    (function() {
      const badge = document.createElement('div');
      badge.style.cssText = 'position:fixed;bottom:10px;left:10px;right:10px;z-index:99999;background:#1e293b;color:#fbbf24;padding:10px;border-radius:10px;font-size:13px;font-family:sans-serif;border:1px solid #334155;';
      badge.textContent = '⏳ In attesa di beforeinstallprompt...';
      document.body.appendChild(badge);
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        badge.style.color = '#4ade80';
        badge.textContent = '✅ beforeinstallprompt RICEVUTO! Il sito è installabile.';
        window.__deferredPrompt = e;
      });
      window.addEventListener('appinstalled', () => {
        badge.textContent = '🎉 App installata!';
      });
      let secs = 0;
      const interval = setInterval(() => {
        secs += 5;
        if (window.__deferredPrompt) { clearInterval(interval); return; }
        badge.style.color = '#fbbf24';
        badge.textContent = `⏳ In attesa di beforeinstallprompt... (${secs}s) — interagisci con la pagina (scroll, tocchi)`;
        if (secs >= 60) {
          clearInterval(interval);
          badge.style.color = '#f87171';
          badge.textContent = '❌ beforeinstallprompt NON ricevuto dopo 60s di interazione.';
        }
      }, 5000);
    })();
    /* FINE DEBUG TEMPORANEO */
  </script>
</body>
</html>
